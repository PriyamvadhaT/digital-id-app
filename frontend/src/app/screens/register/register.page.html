<ion-content class="page-bg">

  <div class="login-wrapper mobile-container">
    <div class="login-decor"></div>
    
    <div class="login-card shadow-deep">
      <!-- Premium Branding Header -->
      <div class="login-header">
        <div class="logo-ring">
          <ion-icon name="shield-half-outline"></ion-icon>
        </div>
        <h1 class="brand-title">Admin Registry</h1>
        <p class="brand-subtitle">Establish a new administrative authority</p>
      </div>

      <!-- Authentication Form -->
      <div class="form-section">
        <div class="input-group">
          <!-- Name -->
          <ion-item lines="none" class="modern-input">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input
              placeholder="Full Legal Name"
              [(ngModel)]="name">
            </ion-input>
          </ion-item>

          <!-- Email -->
          <ion-item lines="none" class="modern-input">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              type="email"
              placeholder="Official Email Address"
              [(ngModel)]="email">
            </ion-input>
          </ion-item>

          <!-- Password -->
          <ion-item lines="none" class="modern-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Create Secure Password"
              [(ngModel)]="password">
            </ion-input>
            <ion-icon
              slot="end"
              class="eye-icon"
              [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
              (click)="togglePassword()">
            </ion-icon>
          </ion-item>

          <!-- Confirm Password -->
          <ion-item lines="none" class="modern-input">
            <ion-icon name="checkmark-done-outline" slot="start"></ion-icon>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Confirm Secure Password"
              [(ngModel)]="confirmPassword">
            </ion-input>
          </ion-item>
        </div>

        <div class="action-stack">
          <ion-button expand="block" mode="ios" class="primary-login-btn" (click)="register()">
            Initialize Admin Account
          </ion-button>

          <ion-button 
            expand="block" 
            fill="clear"
            size="small"
            class="secondary-reg-btn"
            (click)="goToLogin()">
            Return to Secure Login
          </ion-button>
        </div>

        <p class="security-note">
          <ion-icon name="finger-print-outline"></ion-icon>
          High-Security Privileged Access
        </p>
      </div>
    </div>
  </div>

</ion-content>
