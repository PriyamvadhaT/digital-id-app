<ion-content class="page-bg">

  <div class="page-wrapper mobile-container">
    <div class="password-card shadow-deep">
      <!-- Header with Status indicator -->
      <div class="card-header">
        <div class="header-icon-ring">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>
        <h2>Security Update</h2>
        <p>Ensure your account remains protected with a strong password</p>
      </div>

      <!-- Form Section -->
      <div class="form-section">
        <div class="form-group">
          <label>Current Credentials</label>
          <ion-item class="custom-input-item">
            <ion-input
              type="password"
              placeholder="Enter current password"
              [(ngModel)]="currentPassword">
              <ion-icon name="key-outline" slot="start"></ion-icon>
            </ion-input>
          </ion-item>
        </div>

        <div class="form-group">
          <label>New Security Credentials</label>
          <ion-item class="custom-input-item">
            <ion-input
              type="password"
              placeholder="Enter new password"
              [(ngModel)]="newPassword">
              <ion-icon name="lock-open-outline" slot="start"></ion-icon>
            </ion-input>
          </ion-item>
          
          <ion-item class="custom-input-item">
            <ion-input
              type="password"
              placeholder="Confirm new password"
              [(ngModel)]="confirmPassword">
              <ion-icon name="checkmark-done-outline" slot="start"></ion-icon>
            </ion-input>
          </ion-item>
        </div>

        <ion-button
          expand="block"
          mode="ios"
          class="update-password-btn"
          (click)="submit()"
          [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">Update Security Details</span>
        </ion-button>
        
        <p class="security-hint">Passphrases should be at least 8 characters long for optimal security.</p>
      </div>
    </div>
  </div>

</ion-content>
