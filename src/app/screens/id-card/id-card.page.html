<ion-content class="page-bg">

  <div class="id-wrapper" *ngIf="profile">

    <div class="id-card">

      <!-- Header -->
      <div class="card-header">

        <div class="avatar">
          {{ profile.name?.charAt(0) }}
        </div>

        <h2>{{profile.name}}</h2>

        <div class="role">{{role}}</div>

      </div>

      <!-- Information Grid -->

      <div class="info-grid">

        <div class="info-box">
          <span>ID</span>
          <strong>{{profile.id}}</strong>
        </div>

        <div class="info-box">
          <span>Department</span>
          <strong>{{profile.department}}</strong>
        </div>

        <div class="info-box" *ngIf="profile.batch">
          <span>Batch</span>
          <strong>{{profile.batch}}</strong>
        </div>

        <div class="info-box" *ngIf="profile.course">
          <span>Course</span>
          <strong>{{profile.course}}</strong>
        </div>

        <div class="info-box">
          <span>Mobile</span>
          <strong>{{profile.mobile}}</strong>
        </div>

        <div class="info-box" *ngIf="profile.parentMobile">
          <span>Parent</span>
          <strong>{{profile.parentMobile}}</strong>
        </div>

      </div>

      <!-- QR Section -->

      <div class="qr-section">

        <qrcode
          [qrdata]="qrValue"
          [width]="140"
          [errorCorrectionLevel]="'M'">
        </qrcode>

        <p class="scan-text">
          Scan QR to verify this ID
        </p>

      </div>

    </div>

  </div>

</ion-content>
