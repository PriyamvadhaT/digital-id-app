<ion-content class="page-bg">

  <div class="login-wrapper">

    <div class="login-card">

      <!-- Header -->

      <div class="login-header">

        <div class="logo">🎓</div>

        <h2>Digital ID System</h2>

        <p>Login to access your ID</p>

      </div>

      <ion-segment [(ngModel)]="selectedRole">
        <ion-segment-button value="user">User</ion-segment-button>
        <ion-segment-button value="admin">Admin</ion-segment-button>
      </ion-segment>

      <!-- Form -->

      <div class="form-section">

        <ion-item lines="none" class="input-item">

          <ion-icon name="person-outline" slot="start"></ion-icon>

          <ion-input
            placeholder="Username"
            [(ngModel)]="username">
          </ion-input>

        </ion-item>

        <ion-item class="input-item" lines="none">

          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>

          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Password"
            [(ngModel)]="password">
          </ion-input>

          <ion-icon
            slot="end"
            class="eye-icon"
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
            (click)="togglePassword()">
          </ion-icon>

        </ion-item>

        <ion-button expand="block" class="login-btn" (click)="login()">
          Login
        </ion-button>

        <div class="forgot">
          <a (click)="goToForgotPassword()">Forgot Password?</a>
        </div>

      </div>

    </div>

  </div>

</ion-content>
