<ion-content class="dashboard-bg">

  <h2 class="page-header">
    <ion-icon name="people-outline"></ion-icon>
    Employees
  </h2>

  <!-- SEARCH -->

  <ion-item class="search-box">
    <ion-icon name="search-outline" slot="start"></ion-icon>

    <ion-input
      placeholder="Search name, department or ID"
      [(ngModel)]="searchText">
    </ion-input>

  </ion-item>


  <!-- SORT OPTIONS -->

  <div class="sort-options">

    <div class="sort-item">
      <ion-checkbox [(ngModel)]="sortDepartment"></ion-checkbox>
      <span>Department</span>
    </div>

    <div class="sort-item">
      <ion-checkbox [(ngModel)]="sortId"></ion-checkbox>
      <span>ID</span>
    </div>

    <div class="sort-item">
      <ion-checkbox [(ngModel)]="sortName"></ion-checkbox>
      <span>Name</span>
    </div>

  </div>


  <!-- EDIT FORM -->

  <div *ngIf="editingEmployee" class="edit-box">

    <h3>
      <ion-icon name="create-outline"></ion-icon>
      Edit Employee
    </h3>

    <ion-item>
      <ion-input [(ngModel)]="editingEmployee.name" placeholder="Name"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input [(ngModel)]="editingEmployee.department" placeholder="Department"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input [(ngModel)]="editingEmployee.mobile" placeholder="Mobile"></ion-input>
    </ion-item>

    <ion-button expand="block" (click)="updateEmployee()">
      Save Changes
    </ion-button>

    <ion-button expand="block" color="medium" (click)="cancelEdit()">
      Cancel
    </ion-button>

  </div>


  <!-- EMPLOYEE LIST -->

  <div class="employee-list">

    <div class="employee-item" *ngFor="let employee of filteredEmployees()">

      <div class="employee-left">

        <ion-icon name="person-circle-outline"></ion-icon>

        <div>

          <h3>{{ employee.name }}</h3>

          <p>
            {{ getDeptCode(employee.department) }} •
            ID: {{ employee.id }}
          </p>

        </div>

      </div>


      <div class="employee-right">

        <span
          class="status"
          [class.active]="employee.isActive"
          [class.inactive]="!employee.isActive">

          {{ employee.isActive ? 'Active' : 'Inactive' }}

        </span>

        <div class="actions">

          <ion-button
            fill="clear"
            color="warning"
            (click)="editEmployee(employee)">

            <ion-icon name="create-outline"></ion-icon>

          </ion-button>

          <ion-button
            fill="clear"
            color="primary"
            (click)="toggleStatus(employee)">

            <ion-icon name="power-outline"></ion-icon>

          </ion-button>

          <ion-button
            fill="clear"
            color="danger"
            (click)="deleteEmployee(employee._id)">

            <ion-icon name="trash-outline"></ion-icon>

          </ion-button>

        </div>

      </div>

    </div>

  </div>

</ion-content>
